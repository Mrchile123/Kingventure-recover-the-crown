<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kingventure: Recover the Crown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <video id="intro-video" autoplay muted playsinline>
            <source src="Creditos-iniciales.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>

        <div id="start-screen" style="display: none;">
            <img src="titulo.png" id="game-title" alt="Kingventure Recover The Crown">
            <img src="play-button.png" id="play-btn" alt="Play" onclick="startGame()">
        </div>

        <canvas id="gameCanvas" style="display: none;"></canvas>

        <div id="mobile-controls" style="display: none;">
            <div id="btn-left" class="touch-btn">◀</div>
            <div id="btn-right" class="touch-btn">▶</div>
            <div id="btn-jump" class="touch-btn">▲</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
